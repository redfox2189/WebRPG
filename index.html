<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRPG</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="Player">
        <h4>Player stats</h4>
        <p id="Health"></p>
        <p id="Attack"></p>
        <p id="Defence"></p>
    </div>
    <div id="Game_Container">
        <h4 id="Message">Welcome to WebRPG. A simple Rpg about fighting monsters.</h4>
        <div id="Game_View">
            <div id="Monster_Side">
                <p id="Monster"></p>
                <img id="Monster_Image" src="" alt="">
            </div>
            <div id="Player_Side">
                <div id="Starting">
                    <button id="NewBtn">New Game</button>
                    <button id="LoadBtn">Load Game</button>
                </div>
                <div id="Combat">
                    <button id="DefendBtn">Defend</button>
                    <button id="AttackBtn">Attack</button>
                    <button id="SaveBtn">Save Game</button>
                </div>
                <div id="Shop">
                    <button id="HealBtn">Heal</button>
                    <button id="UpgradeBtn">Upgrade</button>
                </div>
            </div>
        </div>
    </div>

</body>

</footer>
